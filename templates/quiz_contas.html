{% extends "base.html" %}

{% block title %}Quiz de Contas - Divermatica{% endblock %}

{% block content %}

<style>
body {
  font-family: Arial, sans-serif;
  background: radial-gradient(ellipse 120% 80% at 60% 110%, #00A8CE 0%, #00C8F0 45%, #5DE8FF 100%);
  margin: 0;
}

.container {
  max-width: 500px;
  margin: 40px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
}

.question {
  margin-bottom: 20px;
  text-align: center;
}

.answers {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
  max-width: 350px;
  margin-left: auto;
  margin-right: auto;
}

.answers label {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 15px;
  cursor: pointer;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  transition: all 0.3s ease;
  background: #fafafa;
}

.answers label:hover {
  background: #f0f0f0;
  border-color: #6ec6ff;
}

.answers input[type="radio"] {
  margin-right: 10px;
  cursor: pointer;
  width: 18px;
  height: 18px;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}

#proxima {
  background: #6ec6ff;
  color: white;
}

#resultadoTela {
  display: none;
  text-align: center;
}

.result-box {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  text-align: left;
}

.btn-group button {
  margin: 10px 0;
}

.novo {
  background: #4caf50;
  color: white;
}

.sair {
  background: #e53935;
  color: white;
}
</style>

<body>

<div class="container" id="quizTela">
  <h2>Quiz de Contas</h2>
  <form id="quizForm"></form>
  <button id="proxima" onclick="proximaQuestao()">Próxima</button>
</div>

<div class="container" id="resultadoTela">
  <h2 id="pontuacao"></h2>

  <div id="erros" class="result-box"></div>

  <div class="btn-group">
    <button class="novo" onclick="novoQuiz()">Novo Quiz</button>
    <button class="sair" onclick="sair()">Sair</button>
  </div>
</div>

<script>

// GERADOR DE QUESTÕES
function gerarQuestao() {
  const operacoes = ["+", "-", "x", "÷"];
  const op = operacoes[Math.floor(Math.random() * operacoes.length)];

  let n1, n2, correta;

  if (op === "+") {
    n1 = Math.floor(Math.random() * 20);
    n2 = Math.floor(Math.random() * 20);
    correta = n1 + n2;
  }

  if (op === "-") {
    n1 = Math.floor(Math.random() * 20);
    n2 = Math.floor(Math.random() * n1);
    correta = n1 - n2;
  }

  if (op === "x") {
    n1 = Math.floor(Math.random() * 10);
    n2 = Math.floor(Math.random() * 10);
    correta = n1 * n2;
  }

  if (op === "÷") {
    n2 = Math.floor(Math.random() * 9) + 1;
    correta = Math.floor(Math.random() * 10);
    n1 = correta * n2;
  }

  let pergunta = `${n1} ${op} ${n2} =`;

  let opcoes = new Set();
  opcoes.add(correta.toString());

  while (opcoes.size < 3) {
    let erro = correta + Math.floor(Math.random() * 5 - 2);
    if (erro !== correta && erro >= 0) {
      opcoes.add(erro.toString());
    }
  }

  return {
    q: pergunta,
    op: Array.from(opcoes).sort(() => Math.random() - 0.5),
    c: correta.toString()
  };
}

let questoesSelecionadas = [];
let questaoAtual = 0;
let respostasUsuario = [];

// GERAR QUIZ
function gerarQuiz() {
  questoesSelecionadas = [];
  respostasUsuario = [];
  questaoAtual = 0;

  for (let i = 0; i < 5; i++) {
    questoesSelecionadas.push(gerarQuestao());
  }

  mostrarQuestao();
}

// MOSTRAR UMA QUESTÃO
function mostrarQuestao() {
  const form = document.getElementById("quizForm");
  form.innerHTML = "";

  const item = questoesSelecionadas[questaoAtual];

  let div = document.createElement("div");
  div.classList.add("question");

  div.innerHTML = `<p>${questaoAtual + 1}) ${item.q}</p>`;

  let answersDiv = document.createElement("div");
  answersDiv.classList.add("answers");

  item.op.forEach(opcao => {
    answersDiv.innerHTML += `
      <label>
        <input type="radio" name="resposta" value="${opcao}">
        ${opcao}
      </label>
    `;
  });

  div.appendChild(answersDiv);
  form.appendChild(div);
}

// AVANÇAR
function proximaQuestao() {
  const resposta = document.querySelector('input[name="resposta"]:checked');

  respostasUsuario[questaoAtual] = resposta ? resposta.value : null;

  questaoAtual++;

  if (questaoAtual < questoesSelecionadas.length) {
    mostrarQuestao();
  } else {
    corrigir();
  }
}

// CORRIGIR
function corrigir() {
  let acertos = 0;
  let errosHTML = "";

  questoesSelecionadas.forEach((item, index) => {
    const resposta = respostasUsuario[index];

    if (resposta === item.c) {
      acertos++;
    } else {
      errosHTML += `<p><b>${item.q}</b><br>
      Sua resposta: ${resposta || "Nenhuma"}<br>
      Correta: ${item.c}</p>`;
    }
  });

  document.getElementById("quizTela").style.display = "none";
  document.getElementById("resultadoTela").style.display = "block";

  document.getElementById("pontuacao").innerText =
    `Você acertou ${acertos} de ${questoesSelecionadas.length}`;

  document.getElementById("erros").innerHTML =
    errosHTML || "Parabéns! Você acertou tudo!";
}

// NOVO QUIZ
function novoQuiz() {
  document.getElementById("resultadoTela").style.display = "none";
  document.getElementById("quizTela").style.display = "block";
  gerarQuiz();
}

// SAIR
function sair() {
  window.location.href = "/quiz";
}

// INICIAR
gerarQuiz();

</script>

{% endblock %}
