<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Divermatica{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='/css/styles.css') }}">
</head>
<body>

    <style>
       /* HEADER GERAL */
        .header {
            background: #ffffff;
            border-bottom: 4px solid #ffd966;
        }


        /* LOGO */
        .logo-area img {
            height: 80px;
            right: 30px;
            position: relative;
        }

        .nav-area {
            width: 100%;
            background: #7dd9f8;           
            border-bottom: 4px solid #4cbbe6;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between; /* 👈 muda aqui */
            gap: 30px; /* espaço entre logo e menu */
            width: 100%;
            padding: 0 40px;
        }

        .nav-logo {
            height: 80px;
            margin-right: 0;
            margin-top: -10px;
            
        }

        .nav-logo img {
            height: 120px;
            width: auto;
        }

        /* MENU */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* LINKS */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;

            background: #52c6f7;
            padding: 10px 22px;
            border-radius: 40px;

            text-decoration: none;
            color: #004b80;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: inset 0 0 6px rgba(255,255,255,0.4);
            cursor: pointer;
            transition: .2s ease;
        }

        .nav-item img {
            width: 40px;
            height: 32px;
        }

        /* ITEM ATIVO (JOGOS) — amarelo igual ao da foto */
        .nav-item.active:hover {
            background: linear-gradient(#ffe36a, #ffbe2f);
            color: #804b00;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.7);
        }

    </style>
   <header class="nav-area">
        <div class="nav-container">

            <!-- LOGO -->
            <a href="{{ url_for('index') }}" class="nav-logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Divermatica">
            </a>

            <!-- LINKS -->
            <nav class="nav-menu">
                <a class="nav-item active" href="{{ url_for('jogos_index') }}">
                    <img src="{{ url_for('static', filename='icons/estrela_jogos_icon.png') }}">
                    Jogos
                </a>

                <a class="nav-item active" href="{{ url_for('sobre') }}">
                    <img src="{{ url_for('static', filename='icons/sobre_icon.png') }}">
                    Sobre
                </a>

                <a class="nav-item active" href="{{ url_for('quiz') }}">
                    <img src="{{ url_for('static', filename='icons/quiz_icon.png') }}">
                    Quiz
                </a>

                <a class="nav-item active" href="{{ url_for('perfil') }}">
                    <img src="{{ url_for('static', filename='icons/perfil_icon.png') }}">
                    Perfil
                </a>
            </nav>

        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>


</body>
</html>
